      user: |
        Correct: {{ target }}
        Response: {{ response }}
      positive: CORRECT
      negative: INCORRECT

  precision_first_substitution_v1:
    matcher:
      system: |
        task: semantic_equivalence
        mode: binary
        instruction: Decide whether Answer A and Answer B are fully semantically equivalent as final answers.
        rules:
          - Output exactly one token: SAME or DIFFERENT.
          - SAME only if the answers can replace each other without changing final meaning.
          - Ignore wording, notation, formatting, order, equivalent units, and ordinary rounding.
          - DIFFERENT for partial overlap, near misses, polarity flips, scope drift, missing or added qualifiers, temporal mismatch, or materially different quantities.
          - If uncertainty remains after normalization, choose DIFFERENT.
          - No reasoning.
      user: |
        answer_a: |
          {{ a }}
        answer_b: |
          {{ b }}
        verdict:
      positive: SAME
      negative: DIFFERENT
    grader:
      system: |
        task: semantic_correctness
        mode: binary
        instruction: Decide whether Response is fully correct relative to Correct answer.
        rules:
          - Output exactly one token: CORRECT or INCORRECT.
          - CORRECT only if Response preserves the same final meaning, scope, polarity, quantity, and time conditions as the Correct answer.
          - Accept paraphrase, notation changes, formatting differences, equivalent units, and ordinary rounding.
          - INCORRECT for partial answers, near misses, extra or missing qualifiers, scope drift, polarity reversal, temporal mismatch, or materially different quantities.
          - If uncertainty remains after normalization, choose INCORRECT.
          - No reasoning.
      user: |
        correct_answer: |
          {{ target }}
        response: |
          {{ response }}
        verdict:
      positive: CORRECT
      negative: INCORRECT

  strict_truth_conditions_v1:
    matcher:
      system: >-
        You judge whether Answer A and Answer B are semantically equivalent.
        Output exactly one token: SAME or DIFFERENT. Ignore wording, notation,
        format, equivalent units, ordinary rounding, and harmless entailed elaboration.
        Use SAME only if each can stand in for the other without changing truth
        conditions or required qualifiers. If one is partial, broader, narrower,
        differently qualified, conditional, scoped, timed, or adds non-entailed
        content, output DIFFERENT.
      user: |
        Answer A: {{ a }}
        Answer B: {{ b }}
        Verdict:
      positive: SAME
      negative: DIFFERENT
    grader:
      system: >-
        You judge whether Response is correct relative to Correct answer.
        Output exactly one token: CORRECT or INCORRECT. Ignore wording, notation,
        format, equivalent units, ordinary rounding, and harmless entailed elaboration.
        Use CORRECT only if the response matches the correct answer in meaning and
        required specificity. If it is partial, broader, narrower, missing qualifiers,
        conditional on different assumptions, scoped or timed differently, or adds
        non-entailed claims, output INCORRECT.
      user: |
        Correct answer: {{ target }}
        Response: {{ response }}
        Verdict:
      positive: CORRECT
      negative: INCORRECT

