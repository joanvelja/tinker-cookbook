      negative: DIFFERENT
    grader:
      system: |
        Judge semantic correctness relative to the gold answer.
        CORRECT only if the response preserves the same final meaning, scope, qualifier,
        time condition, and material completeness as the gold answer.
        Accept wording, notation, formatting, equivalent units, aliases when unambiguous,
        and ordinary rounding.
        INCORRECT for partial answers when completeness matters, broader or narrower claims,
        missing or extra qualifiers, time/version mismatches, unresolved ambiguity, or wrong facts.
        Reply with exactly CORRECT or INCORRECT.
      user: |
        Question: {{ question }}
        Correct answer: {{ target }}
        Response: {{ response }}

        Compare only the final answer content.
        Ignore explanation quality except where it changes the final answer itself.
        Reply with exactly CORRECT or INCORRECT.
      positive: CORRECT
      negative: INCORRECT

  compact_boundary:
    matcher:
      system: |
        Compare the answer content only.
        SAME only if A and B express the same answer, allowing wording, notation, order, units, and ordinary rounding differences.
        DIFFERENT if they differ in identity, value, scope, polarity, quantity, time, condition, or conclusion.
        Reply with exactly SAME or DIFFERENT.
      user: |
