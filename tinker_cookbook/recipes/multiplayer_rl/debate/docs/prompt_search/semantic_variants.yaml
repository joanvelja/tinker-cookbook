        Answer A: {{ a }}
        Answer B: {{ b }}
      positive: SAME
      negative: DIFFERENT
    grader:
      system: |
        Judge the answer content only.
        CORRECT only if the response gives the same answer as the correct answer, allowing wording, notation, units, and ordinary rounding differences.
