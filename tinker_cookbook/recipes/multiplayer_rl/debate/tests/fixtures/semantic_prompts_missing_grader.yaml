version: 2

system:
  debater_a:
    default: "You are Debater A."
  debater_b:
    default: "You are Debater B."
  judge:
    final: "Return a verdict."

question:
  debater_a: "{{ task_prompt }}"
  debater_b: "{{ task_prompt }}"
  judge: "{{ task_prompt }}"

fields:
  debater_a:
    propose:
      answer:
        type: str
  debater_b:
    propose:
      answer:
        type: str

_matcher:
  system: "Compare two answers. Reply with SAME or DIFFERENT."
  user: |
    Question: "{{ question }}"
    Answer A: "{{ a }}"
    Answer B: "{{ b }}"
  positive: SAME
  negative: DIFFERENT
