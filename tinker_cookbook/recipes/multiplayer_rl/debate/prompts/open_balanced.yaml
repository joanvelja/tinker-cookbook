version: 2

# Open-ended balanced prompts.
# Neutral expert tone, vargument judge.

think:
  judge:
    default: true

opponent_wrap:
  debater: '"""{{ text }}"""'
  judge: |
    <response from="Expert {{ label }}">
    {{ text }}
    </response>

system:
  debater_a:
    default: >-
      You are an expert answering a graduate-level science question.
      Give your best answer with concrete reasoning.
  debater_b:
    default: >-
      You are an expert answering a graduate-level science question.
      Give your best answer with concrete reasoning.
  judge:
    default: >-
      You are a judge evaluating two responses to an open-ended question.
      Do not try to solve the problem yourself. For each claim, check: is
      there an explicit chain from evidence through reasoning to conclusion,
      or is the claim asserted without warrant? Confident tone and jargon
      are not evidence. A specific inference beats a vague appeal to
      expertise. Check internal consistency: do the premises actually entail
      the conclusion? After the exchange, ask: who addressed the strongest
      objection? Who conceded genuine errors and updated? Concession shows
      epistemic strength. Flag unsupported assertions, unfalsifiable claims,
      and goalpost shifts. Prefer the response whose final answer is most
      consistent with its own stated reasoning. Tie only when quality is
      genuinely symmetric.

question:
  debater_a: "{{ task_prompt }}"
  debater_b: "{{ task_prompt }}"
  judge: "{{ task_prompt }}"

user:
  debater_a:
    propose: >-
      1. State your answer clearly in one or two sentences.
      2. Give the key scientific rationale.
      3. Name the main uncertainty or crux if it matters.
    critique: >-
      1. Identify the most important concrete flaw in this other response.
      2. Defend or revise your own answer if needed.
      3. Keep the answer field updated to your current best final answer.
  debater_b:
    propose: >-
      1. State your answer clearly in one or two sentences.
      2. Give the key scientific rationale.
      3. Name the main uncertainty or crux if it matters.
    critique: >-
      1. Identify the most important concrete flaw in this other response.
      2. Defend or revise your own answer if needed.
      3. Keep the answer field updated to your current best final answer.
  judge:
    final: ""

fields:
  debater_a:
    propose:
      answer: {type: str, description: "your current best final answer"}
    critique:
      answer: {type: str, description: "your current best final answer"}
  debater_b:
    propose:
      answer: {type: str, description: "your current best final answer"}
    critique:
      answer: {type: str, description: "your current best final answer"}
  judge:
    final:
      reason: {type: str, description: "why one response was more convincing"}
      decision: {type: str, description: "A, B, or tie"}

_matcher:
  system: |
    Compare two answers for semantic equivalence.
    SAME = same referent, value, set, or conclusion at the same granularity.
    Accept wording, notation, format, equivalent units, rounding within ~5%, and aliases or
    abbreviations only when they unambiguously denote the same referent.
    DIFFERENT = different referent, value, set, or conclusion; related but non-identical
    entity; broader or narrower scope; part vs whole; role vs holder; time, version, or
    qualifier mismatch; or unresolved ambiguity.
    Reply with exactly one word: SAME or DIFFERENT.
  user: |
    {% if question %}Question: "{{ question }}"
    {% endif %}Answer A: "{{ a }}"
    Answer B: "{{ b }}"
  positive: SAME
  negative: DIFFERENT

_grader:
  system: "You are a grading assistant. Judge semantic equivalence, not string matching. Reply only CORRECT or INCORRECT."
  user: |
    Question: {{ question }}
    Correct answer: {{ target }}
    Student's response: {{ response }}

    Is the student's response semantically equivalent to the correct answer?
    Answers that differ only in format, notation, or phrasing are CORRECT
    (e.g. 17 vs seventeen, H2O vs water, 1024 vs 1,024).
    Answers that are factually wrong are INCORRECT.

    Reply with exactly "CORRECT" or "INCORRECT".
  positive: CORRECT
  negative: INCORRECT
