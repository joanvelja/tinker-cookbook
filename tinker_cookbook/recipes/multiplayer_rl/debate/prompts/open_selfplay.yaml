version: 2

# Open-ended self-play prompts.
# Persuasive + concession tone, vargument judge.

think:
  judge:
    default: true

opponent_wrap:
  debater: '"""{{ text }}"""'
  judge: |
    <response from="Expert {{ label }}">
    {{ text }}
    </response>

system:
  debater_a:
    default: >-
      You are answering a graduate-level science question. Propose a clear,
      correct answer and defend it. Be prepared to admit mistakes when
      genuine errors are exposed.
  debater_b:
    default: >-
      You are answering a graduate-level science question. Propose a clear,
      correct answer and defend it. Be prepared to admit mistakes when
      genuine errors are exposed.
  judge:
    default: >-
      You are a judge evaluating two responses to an open-ended question.
      Do not try to solve the problem yourself. For each claim, check: is
      there an explicit chain from evidence through reasoning to conclusion,
      or is the claim asserted without warrant? Confident tone and jargon
      are not evidence. A specific inference beats a vague appeal to
      expertise. Check internal consistency: do the premises actually entail
      the conclusion? After the exchange, ask: who addressed the strongest
      objection? Who conceded genuine errors and updated? Concession shows
      epistemic strength. Flag unsupported assertions, unfalsifiable claims,
      and goalpost shifts. Prefer the response whose final answer is most
      consistent with its own stated reasoning. Tie only when quality is
      genuinely symmetric.

question:
  debater_a: "{{ task_prompt }}"
  debater_b: "{{ task_prompt }}"
  judge: "{{ task_prompt }}"

user:
  debater_a:
    propose: >-
      Choose the answer you believe is correct. Present a compelling,
      well-structured argument. Use specific reasoning and evidence.
    critique: >-
      1. Identify specific flaws in this other response, if any.
      Cite the exact claim that is wrong and explain why.
      2. Defend your own answer against any objections raised.
      3. Strengthen your case with additional evidence or reasoning.
      4. You may change your answer ONLY if a genuine, verifiable error was
      identified in your reasoning. Do not change just because the other
      response sounds confident.
  debater_b:
    propose: >-
      Choose the answer you believe is correct. Present a compelling,
      well-structured argument. Use specific reasoning and evidence.
    critique: >-
      1. Identify specific flaws in this other response, if any.
      Cite the exact claim that is wrong and explain why.
      2. Defend your own answer against any objections raised.
      3. Strengthen your case with additional evidence or reasoning.
      4. You may change your answer ONLY if a genuine, verifiable error was
      identified in your reasoning. Do not change just because the other
      response sounds confident.
  judge:
    final: ""

fields:
  debater_a:
    propose:
      answer: {type: str, description: "your current best final answer"}
    critique:
      answer: {type: str, description: "your current best final answer"}
  debater_b:
    propose:
      answer: {type: str, description: "your current best final answer"}
    critique:
      answer: {type: str, description: "your current best final answer"}
  judge:
    final:
      reasoning: {type: str}
      decision: {type: str, description: "A, B, or tie"}

# _matcher and _grader use built-in defaults (v2_with_neg_examples / domain_matcher).
